<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>
  <!-- Palm -->
  <rect x="10" y="16" width="12" height="10" rx="2" fill="#6ee7b7"/>
  <!-- Thumb -->
  <rect x="7" y="18" width="4" height="6" rx="2" fill="#6ee7b7"/>
  <!-- Index finger -->
  <rect x="10" y="8" width="3" height="10" rx="1.5" fill="#6ee7b7"/>
  <!-- Middle finger -->
